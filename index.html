<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>env-testing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="toggle-container">
            <span id="mode-label">Просмотр</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main>
        <!-- Форма для добавления нового поста -->
        <div class="post-form">
            <div style="margin-bottom: 8px;">
                <input type="file" id="image-upload-new" accept="image/*" style="display:none" onchange="handleImageUpload(event, 'new-post-text')">
                <button type="button" class="btn-secondary" style="padding: 0.3rem 0.6rem; font-size: 0.75rem; border: 1px dashed var(--btn-border);" onclick="document.getElementById('image-upload-new').click()">📷 Загрузить фото из Галереи</button>
            </div>
            <textarea id="new-post-text" placeholder="О чем вы думаете?"></textarea>
            <div style="margin-top: 10px; text-align: right;">
                <button class="btn-primary" onclick="addPost()">Опубликовать</button>
            </div>
        </div>

        <!-- Контейнер для постов -->
        <div id="posts-container"></div>
    </main>

    <!-- Модальное окно ввода пароля -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal">
            <h2 id="modal-title">Режим редактирования</h2>
            <p id="modal-desc">Введите кодовую фразу для доступа:</p>
            <input type="password" id="password-input" placeholder="...">
            <div id="password-error" style="color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; display: none;">
                Неверный ввод!
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" style="background: rgba(255,255,255,0.1);" onclick="closePasswordModal()">Отмена</button>
                <button class="btn-primary" onclick="verifyPassword()">Войти</button>
            </div>
            <div id="logout-container" style="margin-top: 15px; display: none;">
                <button class="btn-danger" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;" onclick="logoutGithub()">Забыть токен</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения (замещение встроенного браузерного) -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <h2 style="color: var(--danger); font-size: 1.1rem; border-bottom: 1px solid var(--btn-border); padding-bottom: 0.8rem; margin-bottom: 1.5rem;">Внимание</h2>
            <p id="confirm-msg" style="color: var(--text-color); font-size: 1rem; margin-bottom: 2rem;"></p>
            <div class="modal-buttons">
                <button class="btn-secondary" style="border-color: var(--text-muted); color: var(--text-muted);" onclick="closeConfirmModal(false)">ОТМЕНА</button>
                <button class="btn-danger" style="border-color: var(--danger); color: var(--danger);" onclick="closeConfirmModal(true)">ДА, УВЕРЕН</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
